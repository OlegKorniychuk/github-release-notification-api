name: Node.js CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['main']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # services:
    #   postgres:
    #     image: postgres:15-alpine
    #     env:
    #       POSTGRES_USER: postgres
    #       POSTGRES_PASSWORD: password
    #       POSTGRES_DB: releases_db
    #     ports:
    #       - 5432:5432
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5

    env:
      PORT: 3000
      DATABASE_URL: postgres://postgres:password@localhost:5432/releases_db
      GITHUB_TOKEN: dummy_token_for_tests
      EMAIL_SERVICE: Gmail
      EMAIL_SERVICE_USERNAME: username@gmail.com
      EMAIL_SERVICE_PASSWORD: password
      NOTIFICATION_TOKEN_SECRET: secret

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Lint Code
        run: npm run lint

      - name: Check formatting
        run: npm run format

      - name: Run Tests
        run: npm test
