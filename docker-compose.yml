services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: releases_api
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://postgres:password@db:5432/releases_db
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    restart: no

  db:
    image: postgres:15-alpine
    container_name: releases_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=releases_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d releases_db']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: no

volumes:
  pgdata:
