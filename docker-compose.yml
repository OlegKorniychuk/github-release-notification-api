services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: releases_api
    ports:
      - '3000:3000'
    environment:
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URL}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - EMAIL_SERVICE=${EMAIL_SERVICE}
      - EMAIL_SERVICE_USERNAME=${EMAIL_SERVICE_USERNAME}
      - EMAIL_SERVICE_PASSWORD=${EMAIL_SERVICE_PASSWORD}
      - NOTIFICATION_TOKEN_SECRET=${NOTIFICATION_TOKEN_SECRET}
      - REDIS_URL=redis://localhost:6379
    depends_on:
      db:
        condition: service_healthy
    restart: no

  db:
    image: postgres:15-alpine
    container_name: releases_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=releases_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d releases_db']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: no

  redis:
    image: redis:7-alpine
    container_name: releases_redis
    ports:
      - '6379:6379'
    restart: no

volumes:
  pgdata:
